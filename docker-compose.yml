services:
  db:
    image: postgres:16-alpine
    container_name: fake_book_db
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "${POSTGRES_PORT}:5432"

    volumes:
      - fake_book_db:/var/lib/postgresql/data

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: fake_book_backend

    restart: unless-stopped

    depends_on:
      db:
        condition: service_healthy

    ports:
      - "3000:3000"

    environment:
      NODE_ENV: production
      PORT: 3000
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}?schema=public&connection_limit=5"
      CLOUDFLY_ACCESS_KEY: ${CLOUDFLY_ACCESS_KEY}
      CLOUDFLY_SECRET_KEY: ${CLOUDFLY_SECRET_KEY}
      CLOUDFLY_REGION: ${CLOUDFLY_REGION}
      CLOUDFLY_ENDPOINT: ${CLOUDFLY_ENDPOINT}
      CLOUDFLY_BUCKET_NAME: ${CLOUDFLY_BUCKET_NAME}
      NODE_OPTIONS: "--max-old-space-size=256"

    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  fake_book_db:
