name: Deploy API (Traditional Build on VPS)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ~/fake_book/

            # Kéo code mới nhất từ GitHub về VPS
            git pull origin main

            # Ra lệnh cho Docker Compose build lại image mới từ code vừa kéo
            # --build: bắt buộc build lại kể cả khi đã có image cũ
            # -d: chạy ngầm (detached)
            docker compose up -d --build

            # Dọn dẹp các image cũ, thừa thãi để nhẹ máy
            docker image prune -f
